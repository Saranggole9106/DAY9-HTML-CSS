<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Mood Journal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>📝 My Mood Journal</h1>

  <div class="entry happy">
    <h2>Feeling Great!</h2>
    <p>Today was awesome. I finished my homework and played outside!</p>
    <button class="like-button">❤️ Like</button>
  </div>

  <div class="entry meh">
    <h2>Just Okay</h2>
    <p>Nothing much happened today. It was just a normal day.</p>
    <button class="like-button">❤️ Like</button>
  </div>

  <div class="entry sad">
    <h2>A Bit Down</h2>
    <p>I felt a little sad today. Missed my friends at school.</p>
    <button class="like-button">❤️ Like</button>
  </div>

</body>
</html>
